name: Cleanup stale branches
on:
  # Run when PRs are closed (merged or not)
  pull_request:
    types: [closed]
  # Also run weekly to catch any stragglers
  schedule:
    - cron: "0 3 * * 0" # Sunday 3am UTC

permissions:
  contents: write

concurrency: cleanup-branches

jobs:
  cleanup-pr-branch:
    if: github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'claude/')
    runs-on: ubuntu-latest
    steps:
      - name: Delete claude/ branch from closed PR
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail

          # Only delete if the branch is on the same repo (not a fork)
          if [ "$HEAD_REPO" != "$REPO" ]; then
            echo "Branch is from a fork ($HEAD_REPO), skipping"
            exit 0
          fi

          echo "Deleting branch: $BRANCH"
          gh api -X DELETE "repos/$REPO/git/refs/heads/$BRANCH" || echo "Branch already deleted"

  cleanup-stale-branches:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Find and delete stale claude/ branches
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          cutoff=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          echo "Cutoff time: $cutoff (branches updated after this are skipped)"

          # List all branches matching claude/*
          page=1
          while true; do
            branches=$(gh api "repos/$REPO/branches?per_page=100&page=$page" --jq '.[] | select(.name | startswith("claude/")) | .name' 2>/dev/null || true)
            [ -z "$branches" ] && break

            while IFS= read -r branch; do
              echo ""
              echo "Checking branch: $branch"

              # Get last commit date
              last_commit=$(gh api "repos/$REPO/branches/$branch" --jq '.commit.commit.committer.date' 2>/dev/null || true)
              if [ -n "$last_commit" ] && [[ "$last_commit" > "$cutoff" ]]; then
                echo "  Skipping: updated recently ($last_commit)"
                continue
              fi

              # Check if there's an open PR for this branch
              open_prs=$(gh pr list --repo "$REPO" --head "$branch" --state open --json number --jq 'length' 2>/dev/null || echo "0")
              if [ "$open_prs" != "0" ]; then
                echo "  Skipping: has open PR"
                continue
              fi

              # Check if there's a merged/closed PR (branch is safe to delete)
              all_prs=$(gh pr list --repo "$REPO" --head "$branch" --state all --json number --jq 'length' 2>/dev/null || echo "0")
              if [ "$all_prs" = "0" ]; then
                echo "  Skipping: no associated PRs found"
                continue
              fi

              echo "  Deleting branch: $branch"
              gh api -X DELETE "repos/$REPO/git/refs/heads/$branch" || echo "  Failed to delete $branch"
            done <<<"$branches"

            page=$((page + 1))
          done

          echo ""
          echo "Cleanup complete"
