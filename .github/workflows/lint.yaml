name: Lint

# No paths filter: lint-passed is a required status check, so the workflow must
# always fire and report — a path-gated required check hangs at
# "Expected — Waiting" forever when a PR doesn't touch the filtered paths. The
# lint job no-ops when no lint/check script is configured, so it stays cheap.
on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env

      - name: Check if scripts are configured
        id: check
        run: |
          if bash .github/scripts/script-configured.sh check; then
            echo "check_configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "check_configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Type check script not configured, skipping"
          fi
          if bash .github/scripts/script-configured.sh lint; then
            echo "lint_configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "lint_configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Lint script not configured, skipping"
          fi

      - name: Type check
        if: steps.check.outputs.check_configured == 'true'
        run: pnpm check

      - name: Lint
        if: steps.check.outputs.lint_configured == 'true'
        run: pnpm lint

  # Stable Required check: runs even when `lint` is cancelled/skipped, so a
  # protected branch never gets stuck on a check that never reports.
  lint-passed: # required-check: true
    if: always()
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
