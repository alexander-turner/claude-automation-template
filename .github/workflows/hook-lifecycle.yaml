name: Hook lifecycle

# Runs the full Claude hook lifecycle (session setup -> pre-commit -> pre-push)
# on a clean checkout, so a broken hook is caught in CI rather than in a session.

on:
  push:
    branches: ["main"]
    paths:
      - ".claude/hooks/**"
      - ".hooks/**"
      - "setup.sh"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pyproject.toml"
      - "uv.lock"
      - ".pre-commit-config.yaml"
      - ".github/scripts/run-hook-lifecycle.sh"
      - ".github/workflows/hook-lifecycle.yaml"
  pull_request: # not-required-check: single advisory job, path-gated, no required reporter
    paths:
      - ".claude/hooks/**"
      - ".hooks/**"
      - "setup.sh"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pyproject.toml"
      - "uv.lock"
      - ".pre-commit-config.yaml"
      - ".github/scripts/run-hook-lifecycle.sh"
      - ".github/workflows/hook-lifecycle.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  hook-lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env
        with:
          setup-python: "true"

      - name: Run hook lifecycle
        run: bash .github/scripts/run-hook-lifecycle.sh
