name: Node tests

# No paths filter: node-tests-passed is a required status check, so the workflow
# must always fire and report — a path-gated required check hangs at
# "Expected — Waiting" forever when a PR doesn't touch the filtered paths. The
# test job no-ops when no test script is configured, so it stays cheap.
on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env

      - name: Check if test script is configured
        id: check
        run: |
          if bash .github/scripts/script-configured.sh test; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Test script not configured, skipping tests"
          fi

      - name: Run tests
        if: steps.check.outputs.configured == 'true'
        run: pnpm test

  # Stable Required check: runs even when `test` is cancelled/skipped, so a
  # protected branch never gets stuck on a check that never reports.
  node-tests-passed: # required-check: true
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
