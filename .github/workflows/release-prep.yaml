name: Release prep (pre-merge version bump)

# When a PR is labeled `release`, classify the pending changelog.d/ fragments as
# a conservative semver bump (patch or minor — never major) and commit the
# package.json bump + assembled CHANGELOG roll onto the PR branch. The bump then
# merges as part of the PR, so main's latest commit stays the real merge/squash
# commit. The matching vX.Y.Z tag is created post-merge by tag-release.yaml.
#
# Versioned-app workflow: only adopt this in a repo that is published/consumed
# with a semver package.json (e.g. an npm package or CLI). Repos that are not
# versioned releases (e.g. a website like TurnTrout.com) should exclude this via
# the template-sync EXCLUDE_PATHS list — see .github/workflows/template-sync.yaml.

on:
  pull_request:
    types: [labeled]
    branches: [main, master]

concurrency:
  group: release-prep-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump:
    name: Conservative version bump on the PR branch
    if: github.event.label.name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR branch
        # Credentials stay persisted: release-prep.sh pushes the bump with them.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 # zizmor: ignore[artipacked]
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.TEMPLATE_SYNC_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc

      - name: Bump version on the PR branch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: bash .github/scripts/release-prep-bump-version.sh
