name: Validate config
on:
  push:
    paths:
      - ".claude/**"
      - ".hooks/**"
      - ".github/workflows/**"
      - "package.json"
  pull_request:
    paths:
      - ".claude/**"
      - ".hooks/**"
      - ".github/workflows/**"
      - "package.json"
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Validate configuration
        run: bash .github/scripts/validate-config.sh
